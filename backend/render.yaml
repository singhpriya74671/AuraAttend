services:
  - type: web
    name: auraattend-api
    env: python
    plan: free
    rootDir: .
    buildCommand: pip install -r requirements-render.txt
    startCommand: gunicorn "app:create_app()" --worker-class eventlet --workers 1 --timeout 120 --bind 0.0.0.0:$PORT
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: FACE_EMBED_KEY
        generateValue: true
      - key: RATELIMIT_STORAGE_URI
        value: memory://
